<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>授業タイマー Ultimate Cyber & みらかけナビ</title>
    <style>
        :root {
            --bg-dark: #030712;
            --panel-bg: rgba(15, 23, 42, 0.45);
            --panel-border: rgba(6, 182, 212, 0.25);
            --cyan: #06b6d4;
            --cyan-glow: rgba(6, 182, 212, 0.4);
            --green: #10b981;
            --green-glow: rgba(16, 185, 129, 0.4);
            --yellow: #f59e0b;
            --yellow-glow: rgba(245, 158, 11, 0.3);
            --red: #ef4444;
            --red-glow: rgba(239, 68, 68, 0.4);
            --purple: #a855f7;
            --purple-glow: rgba(168, 85, 247, 0.4);
            --text-muted: rgba(156, 163, 175, 0.8);
            --text-main: #f3f4f6;
        }

        /* ーーー アクセシビリティ・テーマ設定 ーーー */
        body.theme-dark {
            --bg-dark: #0a0a0a;
            --panel-bg: #121212;
            --panel-border: #262626;
            --cyan: #38bdf8;
            --purple: #c084fc;
        }
        body.theme-light {
            --bg-dark: #f3f4f6;
            --panel-bg: #ffffff;
            --panel-border: #d1d5db;
            --cyan: #0284c7;
            --green: #16a34a;
            --yellow: #d97706;
            --red: #dc2626;
            --purple: #9333ea;
            --text-muted: #4b5563;
            --text-main: #1f2937;
            background: #f3f4f6;
            color: var(--text-main);
        }
        body.theme-highcontrast {
            --bg-dark: #000000;
            --panel-bg: #000000;
            --panel-border: #ffffff;
            --cyan: #00ffff;
            --green: #00ff00;
            --yellow: #ffff00;
            --red: #ff0000;
            --purple: #ff00ff;
            --text-muted: #ffffff;
            --text-main: #ffffff;
            background: #000000;
        }

        * {
            box-sizing: border-box;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
            color: var(--text-main);
            background: radial-gradient(circle at 50% 10%, #0f172a 0%, var(--bg-dark) 70%);
            background-attachment: fixed;
            line-height: 1.5;
            overflow-x: hidden;
        }

        .wrapper {
            max-width: 800px;
            margin: auto;
            padding: 16px 10px;
        }

        .card {
            background: var(--panel-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid var(--panel-border);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        /* アクセシビリティバー */
        .accessibility-bar {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        .theme-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--panel-border);
            color: var(--text-main);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            cursor: pointer;
            font-weight: 600;
        }
        .theme-btn:hover { background: rgba(255, 255, 255, 0.15); }

        h1 {
            text-align: center;
            font-size: clamp(18px, 4.5vw, 26px);
            margin: 0 0 4px 0;
            font-weight: 800;
            letter-spacing: 0.5px;
            background: linear-gradient(to right, #ffffff, var(--cyan), var(--purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        body.theme-light h1 {
            background: none;
            -webkit-text-fill-color: initial;
            color: var(--text-main);
        }

        .date {
            text-align: center;
            color: var(--text-muted);
            font-size: 12px;
            margin-bottom: 20px;
            letter-spacing: 0.5px;
        }

        /* タイマー */
        .timer {
            display: flex;
            justify-content: center;
            margin: 15px 0;
        }
        .circle {
            position: relative;
            width: clamp(170px, 42vw, 210px);
            height: clamp(170px, 42vw, 210px);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        svg {
            transform: rotate(-90deg);
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            filter: drop-shadow(0 0 10px var(--cyan-glow));
        }
        .bg-circle { fill: none; stroke: rgba(255, 255, 255, 0.05); stroke-width: 12; }
        body.theme-highcontrast .bg-circle { stroke: #333; }
        .progress-circle { fill: none; stroke: url(#color-class); stroke-width: 12; stroke-linecap: round; transition: stroke-dashoffset 0.3s linear; }
        .center { position: relative; z-index: 10; text-align: center; width: 90%; padding: 8px; }
        .clock { font-size: clamp(20px, 5vw, 26px); font-weight: 800; color: var(--text-main); line-height: 1.1; }
        .remain { font-size: clamp(10px, 2.5vw, 12px); color: #fde68a; margin-top: 4px; font-weight: 600; }
        body.theme-light .remain { color: var(--yellow); }
        .status { text-align: center; font-size: clamp(14px, 3.2vw, 16px); font-weight: 700; margin-bottom: 20px; padding: 0 8px; }

        .after-school-card {
            background: rgba(16, 185, 129, 0.06);
            border: 1px dashed var(--green);
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
        }
        .after-school-card.active { display: block; }
        .after-school-title { font-weight: 700; color: var(--green); margin-bottom: 4px; font-size: 13px; }
        .after-school-text { font-size: 11px; color: var(--text-main); }

        /* セクション設計 */
        .section { margin-top: 24px; }
        .section.hidden-section { display: none !important; }
        .title { font-size: 13px; font-weight: 700; color: var(--cyan); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        .title::after { content: ''; flex: 1; height: 1px; background: linear-gradient(to right, rgba(6, 182, 212, 0.2), transparent); }
        .title.mirakake-title { color: var(--purple); }

        .box { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }

        /* キーワードカード */
        .keyword {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 10px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        body.theme-light .keyword { background: #f9fafb; border-color: #e5e7eb; }
        .keyword-header { display: flex; align-items: center; justify-content: space-between; }
        .badge { font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 10px; background: rgba(255, 255, 255, 0.1); }
        .badge.class { color: var(--cyan); background: rgba(6, 182, 212, 0.1); }
        .badge.in { color: var(--green); background: rgba(16, 185, 129, 0.1); }
        .badge.out { color: var(--red); background: rgba(239, 68, 68, 0.1); }
        .badge.mirakake { color: var(--purple); background: rgba(168, 85, 247, 0.1); }
        .keyword-body { font-size: 13px; font-weight: 700; color: var(--text-main); word-break: break-all; }
        .empty-key { color: rgba(255, 255, 255, 0.3); font-weight: 400; font-size: 11px; }
        body.theme-light .empty-key { color: #9ca3af; }

        /* アコーディオン */
        .accordion-btn { width: 100%; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 8px; padding: 10px 12px; color: var(--text-main); font-weight: 700; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: 12px; }
        body.theme-light .accordion-btn { background: #f3f4f6; border-color: #e5e7eb; }
        .accordion-container { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; }
        .accordion-container.open { max-height: 400px; overflow-y: auto; scroll-behavior: smooth; }

        .mirakake-day-block { border-left: 3px solid var(--purple); padding-left: 8px; margin-bottom: 10px; padding-top: 4px; padding-bottom: 4px; scroll-margin-top: 6px; }
        .mirakake-day-date { font-size: 11px; font-weight: 800; color: var(--purple); margin-bottom: 4px; }
        .mirakake-grid-compact { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 4px; }
        .mirakake-item-compact { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.04); padding: 6px; border-radius: 4px; font-size: 11px; }
        body.theme-light .mirakake-item-compact { background: #f9fafb; border-color: #e5e7eb; }
        .mirakake-item-name { font-weight: 700; color: var(--text-main); }
        .mirakake-item-room { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

        /* 管理者モード用スタイル */
        .admin-trigger { text-align: center; margin-top: 30px; font-size: 11px; color: var(--text-muted); cursor: pointer; text-decoration: underline; }
        .admin-panel { background: rgba(239, 68, 68, 0.05); border: 1px solid var(--red); border-radius: 12px; padding: 15px; margin-top: 15px; display: none; }

        .line { text-align: center; margin-top: 20px; }
        .line img { height: 32px; opacity: 0.8; }
        .footer { text-align: center; font-size: 10px; color: var(--text-muted); margin-top: 15px; opacity: 0.5; }

        @media (max-width: 600px) { .box { grid-template-columns: 1fr; } .mirakake-grid-compact { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="wrapper">
    <!-- アクセシビリティバー（最上部設定） -->
    <div class="accessibility-bar">
        <button class="theme-btn" onclick="changeTheme('cyber')">🌐 サイバー</button>
        <button class="theme-btn" onclick="changeTheme('dark')">🌑 ダーク</button>
        <button class="theme-btn" onclick="changeTheme('light')">☀️ ライト</button>
        <button class="theme-btn" onclick="changeTheme('highcontrast')">👁️ 高コントラスト</button>
    </div>

    <div class="card">
        <!-- ① 授業タイマー -->
        <h1>📚 授業タイマー Ultimate Cyber</h1>
        <div class="date" id="date"></div>

        <div class="timer">
            <div class="circle">
                <svg viewBox="0 0 280 280">
                    <defs>
                        <linearGradient id="color-class"><stop offset="0%" stop-color="#06b6d4"/><stop offset="50%" stop-color="#10b981"/><stop offset="100%" stop-color="#ef4444"/></linearGradient>
                        <linearGradient id="color-break"><stop offset="0%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#06b6d4"/></linearGradient>
                        <linearGradient id="color-finished"><stop offset="0%" stop-color="#a855f7"/><stop offset="100%" stop-color="#10b981"/></linearGradient>
                        <linearGradient id="color-sleep"><stop offset="0%" stop-color="#ef4444"/><stop offset="100%" stop-color="#a855f7"/></linearGradient>
                    </defs>
                    <circle class="bg-circle" cx="140" cy="140" r="110"/>
                    <circle id="progress" class="progress-circle" cx="140" cy="140" r="110"/>
                </svg>
                <div class="center">
                    <div class="clock" id="clock">00:00:00</div>
                    <div class="remain" id="remain">ONLINE</div>
                </div>
            </div>
        </div>
        <div class="status" id="status">SYSTEM READY</div>

        <div class="after-school-card" id="after-school-msg">
            <div class="after-school-title">✨ TODAY'S LESSONS COMPLETED ✨</div>
            <div class="after-school-text" id="after-school-text"></div>
        </div>

        <!-- ② 今日のキーワード (固定配列順) -->
        <div class="section" id="today-keywords-section">
            <div class="title">✨ 今日のキーワード</div>
            <div id="today" class="box"></div>
            <div id="demo-notice" style="display:none; font-size:11px; color:var(--yellow); text-align:center; margin-top:5px;"></div>
        </div>

        <!-- ③ 今日のみらいの架け橋レッスン -->
        <div class="section" id="mirakake-today-section">
            <div class="title mirakake-title">🎨 今日のみらいの架け橋レッスン (12:50〜14:20)</div>
            <div id="mirakake-today" class="box"></div>
        </div>

        <!-- ④ キーワード一覧 (プルダウン形式) -->
        <div class="section" id="keyword-list-section">
            <div class="title">🗂️ キーワード一覧 (過去ログ)</div>
            <button class="accordion-btn" id="kw-accordion-btn" onclick="toggleKeywordList()">
                <span>📋 過去のキーワード履歴をみる</span>
                <span id="kw-accordion-icon">▼</span>
            </button>
            <div class="accordion-container" id="keyword-list-container">
                <div id="history" style="padding: 10px 5px; display:flex; flex-direction:column; gap:12px;"></div>
            </div>
        </div>

        <!-- ⑤ みらかけの日程 (プルダウン形式) -->
        <div class="section" id="mirakake-list-section">
            <div class="title mirakake-title">📅 みらかけの日程 (7月予定表)</div>
            <button class="accordion-btn" id="accordion-btn" onclick="toggleMirakakeList()">
                <span>📋 全ての日程と教室をみる</span>
                <span id="accordion-icon">▼</span>
            </button>
            <div class="accordion-container" id="mirakake-list-container">
                <div id="mirakake-list" style="padding: 10px 5px;"></div>
            </div>
        </div>

        <!-- 管理者モード認証エリア -->
        <div class="admin-trigger" onclick="promptAdminLogin()">🔒 管理者モードログイン</div>
        <div class="admin-panel" id="admin-panel">
            <h3 style="color:var(--red); margin:0 0 10px 0; font-size:14px;">🛠️ 管理者コントロールパネル (認証済)</h3>
            <p style="font-size:11px; margin:0 0 10px 0;">ステータス: 稼働中 | アカウント: anko. kurorabu</p>
            <button class="theme-btn" style="border-color:var(--red);" onclick="alert('GASキャッシュを強制クリアしました(シミュレート)')">GASキャッシュクリア</button>
            <button class="theme-btn" onclick="alert('システムログ：エラー0件')">システムログ抽出</button>
        </div>

        <div class="line">
            <a href="https://lin.ee/YkfIPJ8" target="_blank" rel="noopener noreferrer">
                <img src="https://scdn.line-apps.com/n/line_add_friends/btn/ja.png" alt="友だち追加">
            </a>
        </div>
        <div class="footer">POWERED BY GOOGLE APPS SCRIPT</div>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxKQU0nkigff43QcWPp9tEEtIFxH57Bn89c3qYH6Q2BZd-_z3L2DszNaPY2Ka6XlweZ/exec";

    const schedule = [
        { name: "1限", start: "09:20", end: "10:10" },
        { name: "2限", start: "10:20", end: "11:10" },
        { name: "3限", start: "11:20", end: "12:10" }
    ];

    const mirakakeSchedule = {
        "2026-07-13": [{ name: "クラフト", room: "9A" }, { name: "ネイル", room: "9B" }],
        "2026-07-14": [{ name: "イラスト", room: "9A" }, { name: "ネイル", room: "9B" }, { name: "スポーツ", room: "9C" }],
        "2026-07-15": [{ name: "オープンレッスン", room: "9A" }, { name: "4コマ漫画", room: "9B" }],
        "2026-07-16": [{ name: "オープンレッスン", room: "9A" }, { name: "書道", room: "9B" }],
        "2026-07-17": [{ name: "✨ みらかけ発表会 ✨", room: "各教室" }]
    };

    // アクセシビリティ：テーマ変更
    function changeTheme(theme) {
        document.body.className = '';
        if(theme !== 'cyber') {
            document.body.classList.add('theme-' + theme);
        }
    }

    // 管理者ログイン
    function promptAdminLogin() {
        const id = prompt("管理者IDを入力してください:");
        if (id === null) return;
        const pass = prompt("パスワードを入力してください:");
        if (pass === null) return;

        if (id.trim() === "anko. kurorabu" && pass === "Mitarashidango06") {
            alert("認証に成功しました。管理者パネルを開きます。");
            document.getElementById("admin-panel").style.display = "block";
        } else {
            alert("IDまたはパスワードが違います。");
        }
    }

    const radius = 110;
    const circleLength = 2 * Math.PI * radius;
    const progress = document.getElementById("progress");
    const dateEl = document.getElementById("date");
    const clockEl = document.getElementById("clock");
    const statusEl = document.getElementById("status");
    const remainEl = document.getElementById("remain");
    const afterSchoolCard = document.getElementById("after-school-msg");
    const afterSchoolText = document.getElementById("after-school-text");

    progress.style.strokeDasharray = circleLength;
    progress.style.strokeDashoffset = circleLength;

    function sec(t) {
        let [h, m] = t.split(":").map(Number);
        return h * 3600 + m * 60;
    }

    function formatDateLocal(dateObj) {
        const y = dateObj.getFullYear();
        const m = String(dateObj.getMonth() + 1).padStart(2, "0");
        const d = String(dateObj.getDate()).padStart(2, "0");
        return `${y}-${m}-${d}`;
    }

    function tick() {
        const now = new Date();
        const dayOfWeek = now.getDay();
        dateEl.textContent = now.toLocaleDateString("ja-JP", { dateStyle: "full" });
        clockEl.textContent = now.toLocaleTimeString("ja-JP");
        const nowSec = now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds();

        let msg = "🎉 今日の授業はすべて終了しました"; let rem = "お疲れ様でした！";
        let percent = 100; let left = 99999; let isBreak = false; let isFinished = false; let isSleepTime = false;

        if (nowSec >= 21 * 3600 || nowSec < 5 * 3600) isSleepTime = true;

        if (dayOfWeek === 0 || dayOfWeek === 6) {
            msg = "🍵 休日のため授業はありません"; rem = "素敵な週末を！"; isFinished = true;
        } else {
            const lastLessonEnd = sec(schedule[schedule.length - 1].end);
            if (nowSec >= lastLessonEnd) {
                isFinished = true;
                if (nowSec < 12 * 3600 + 50 * 60) {
                    const diffSec = (12 * 3600 + 50 * 60) - nowSec;
                    msg = "⚡️ 放課後 / お昼休み"; rem = `みらかけ開始まで ${Math.floor(diffSec / 60)}分 ${diffSec % 60}秒`;
                } else if (nowSec < 14 * 3600 + 20 * 60) {
                    msg = "✨ みらいの架け橋レッスン実施中"; rem = "14:20 終了予定";
                } else if (nowSec < 18 * 3600) {
                    msg = "🌅 放課後 / 下校時間"; rem = "帰り道、気をつけてね！";
                } else if (!isSleepTime) {
                    msg = "🌌 今日も一日お疲れ様でした！"; rem = "しっかり体を休めましょう";
                }
            } else {
                for (let i = 0; i < schedule.length; i++) {
                    const current = schedule[i]; const start = sec(current.start); const end = sec(current.end);
                    if (nowSec < start) {
                        if (i > 0 && nowSec >= sec(schedule[i - 1].end)) {
                            const breakStart = sec(schedule[i - 1].end); left = start - nowSec;
                            msg = `☕️ 休み時間 (${schedule[i - 1].name} ➔ ${current.name})`;
                            rem = `次まで ${Math.floor(left / 60)}分 ${String(left % 60).padStart(2, "0")}秒`;
                            percent = ((nowSec - breakStart) / (start - breakStart)) * 100; isBreak = true;
                        } else {
                            left = start - nowSec; msg = `🕒 スタンドバイ: ${current.name}`;
                            rem = `開始まで ${Math.floor(left / 60)}分 ${left % 60}秒`; percent = 0;
                        }
                        break;
                    }
                    if (nowSec >= start && nowSec < end) {
                        left = end - nowSec; msg = `⚡️ ${current.name} 進行中`;
                        rem = `残り ${Math.floor(left / 60)}分 ${left % 60}秒`; percent = ((nowSec - start) / (end - start)) * 100;
                        break;
                    }
                }
            }
        }

        if (isSleepTime) {
            msg = "💤 夜更かしはサイバーウェアに毒だぞ！"; rem = "はよ寝ろ！明日に響くぞ！😴";
            progress.style.stroke = "url(#color-sleep)";
        } else if (isFinished) { progress.style.stroke = "url(#color-finished)"; }
        else if (isBreak) { progress.style.stroke = "url(#color-break)"; }
        else { progress.style.stroke = "url(#color-class)"; }

        statusEl.textContent = msg; remainEl.textContent = rem;
        progress.style.strokeDashoffset = Math.max(0, Math.min(circleLength, circleLength - (circleLength * percent / 100)));

        const mirakakeSection = document.getElementById("mirakake-today-section");
        if (nowSec >= sec("12:10") && nowSec < sec("14:20") && dayOfWeek !== 0 && dayOfWeek !== 6) {
            if (afterSchoolCard) { afterSchoolCard.classList.add("active"); afterSchoolText.textContent = "通常授業お疲れ様でした！この後はみらかけを楽しみましょう！✨"; }
        } else { if (afterSchoolCard) afterSchoolCard.classList.remove("active"); }

        if (mirakakeSection) {
            if (nowSec >= sec("14:20") || dayOfWeek === 0 || dayOfWeek === 6) mirakakeSection.classList.add("hidden-section");
            else mirakakeSection.classList.remove("hidden-section");
        }
    }

    function toggleKeywordList() {
        const container = document.getElementById("keyword-list-container");
        document.getElementById("kw-accordion-icon").textContent = container.classList.toggle("open") ? "▲" : "▼";
    }

    function toggleMirakakeList() {
        const container = document.getElementById("mirakake-list-container");
        const isOpen = container.classList.toggle("open");
        document.getElementById("accordion-icon").textContent = isOpen ? "▲" : "▼";
        if (isOpen) {
            setTimeout(() => {
                const todayBlock = document.getElementById("mirakake-target-today");
                if (todayBlock) todayBlock.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 150);
        }
    }

    function parseItemDate(dateInput) {
        if (!dateInput) return "";
        let d = new Date(dateInput);
        if (isNaN(d.getTime())) d = new Date(String(dateInput).replace(/\//g, '-'));
        return isNaN(d.getTime()) ? "" : formatDateLocal(d);
    }

    function loadMirakake() {
        const todayStr = formatDateLocal(new Date());
        const todayBox = document.getElementById("mirakake-today");
        const listEl = document.getElementById("mirakake-list");

        let todayHtml = "";
        if (mirakakeSchedule[todayStr]) {
            mirakakeSchedule[todayStr].forEach(item => {
                todayHtml += `<div class="keyword" style="border-color:var(--purple);"><div class="keyword-header"><span class="badge mirakake">🎨 みらかけ</span></div><div class="keyword-body">${item.name}</div><div style="font-size:10px; color:var(--text-muted)">部屋: ${item.room}</div></div>`;
            });
        } else {
            todayHtml = `<div class="keyword" style="grid-column:1/-1; text-align:center; color:var(--text-muted); font-size:11px;">本日の予定はありません</div>`;
        }
        todayBox.innerHTML = todayHtml;

        let listHtml = "";
        Object.keys(mirakakeSchedule).sort().forEach(dateStr => {
            const isToday = (dateStr === todayStr);
            listHtml += `<div class="mirakake-day-block" ${isToday ? 'id="mirakake-target-today" style="background:rgba(168,85,247,0.1)"' : ''}><div class="mirakake-day-date">📅 ${dateStr.replace(/-/g,'/')} ${isToday?'⭐️本日':''}</div><div class="mirakake-grid-compact">`;
            mirakakeSchedule[dateStr].forEach(item => {
                listHtml += `<div class="mirakake-item-compact"><div class="mirakake-item-name">${item.name}</div><div class="mirakake-item-room">🚪 ${item.room}</div></div>`;
            });
            listHtml += `</div></div>`;
        });
        listEl.innerHTML = listHtml;
    }

    async function loadKeywords() {
        const todayBox = document.getElementById("today");
        const historyBox = document.getElementById("history");
        let data = [];

        try {
            const res = await fetch(GAS_URL);
            if (res.ok) data = await res.json();
        } catch (e) {
            // オフライン・デモデータ
            const today = formatDateLocal(new Date());
            data = [
                { "日付": today, "キーワードの種類": "授業", "時間": "2限目", "授業キーワード": "数学Ⅱ" },
                { "日付": today, "キーワードの種類": "登下校", "登下校": "登校", "登校キーワード": "88412" },
                { "日付": today, "キーワードの種類": "授業", "時間": "1限目", "授業キーワード": "現代の国語" },
                { "日付": today, "キーワードの種類": "登下校", "登下校": "下校", "下校キーワード": "14:30完全下校" },
                { "日付": today, "キーワードの種類": "授業", "時間": "3限目", "授業キーワード": "英語コミュニケーション" }
            ];
        }

        const todayStr = formatDateLocal(new Date());
        const groups = {};
        data.forEach(item => {
            const dStr = parseItemDate(item["日付"]);
            if (dStr) { if (!groups[dStr]) groups[dStr] = []; groups[dStr].push(item); }
        });

        // ⭐ 【重要】今日のキーワードを「登校 ➔ 1限目 ➔ 2限目 ➔ 3限目 ➔ 下校」の順に強制ソートする定義
        const orderMap = { "登校": 1, "1限目": 2, "2限目": 3, "3限目": 4, "下校": 5 };
        function getSortOrder(item) {
            if (item["キーワードの種類"] === "登下校") return orderMap[item["登下校"]] || 99;
            if (item["キーワードの種類"] === "授業") return orderMap[item["時間"]] || 99;
            return 99;
        }

        let todayHTML = "";
        if (groups[todayStr]) {
            // スプレッドシートの並び順に関係なく自動で並び替え
            groups[todayStr].sort((a, b) => getSortOrder(a) - getSortOrder(b));
            groups[todayStr].forEach(item => { todayHTML += createCard(item); });
        } else {
            todayHTML = `<div class="keyword" style="grid-column:1/-1; text-align:center; color:var(--text-muted); font-size:11px;">本日のキーワードは未登録です</div>`;
        }
        todayBox.innerHTML = todayHTML;

        let historyHTML = "";
        Object.keys(groups).filter(d => d !== todayStr).sort().reverse().slice(0, 3).forEach(date => {
            historyHTML += `<div><div class="history-day-title">📅 ${date.replace(/-/g, '/')}</div><div class="box" style="margin-top:6px;">`;
            groups[date].sort((a, b) => getSortOrder(a) - getSortOrder(b)).forEach(item => { historyHTML += createCard(item); });
            historyHTML += `</div></div>`;
        });
        historyBox.innerHTML = historyHTML || `<div class="keyword" style="text-align:center; color:var(--text-muted); font-size:11px;">履歴はありません</div>`;
    }

    function createCard(item) {
        let label = "その他"; let typeClass = "class"; let icon = "📝"; let rawText = "";
        if (item["キーワードの種類"] === "登下校") {
            if (item["登下校"] === "登校") { icon = "🏫"; label = "登校"; typeClass = "in"; rawText = item["登校キーワード"]; }
            else { icon = "🏠"; label = "下校"; typeClass = "out"; rawText = item["下校キーワード"]; }
        } else {
            icon = "📚"; label = item["時間"] || "授業"; typeClass = "class"; rawText = item["授業キーワード"];
        }
        return `<div class="keyword"><div class="keyword-header"><span class="badge ${typeClass}">${icon} ${label}</span></div><div class="keyword-body">${rawText || '<span class="empty-key">未登録</span>'}</div></div>`;
    }

    tick(); loadKeywords(); loadMirakake();
    setInterval(tick, 1000); setInterval(loadKeywords, 45000);
</script>
</body>
</html>
